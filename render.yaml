services:
  - type: web
    name: sign-language-translator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run SignLanguageTranslator/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
